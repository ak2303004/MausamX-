<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="MausamX – Real-time local weather forecast, 6-day outlook, humidity and feels-like." />
  <link rel="icon" type="png" href="img/icon.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <title>MausamX – Local Forecast</title>
</head>

<body>

  <!-- ══ Top Navigation ══════════════════════════════════════════ -->
  <header class="mx-header">
    <div class="mx-header-inner">

      <!-- Logo -->
      <div class="mx-logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#ffffff" fill="none"
          stroke="#ffffff" stroke-width="3" stroke-linecap="round">
          <path
            d="M9.0784 14.9999L7.30434 17.6837C7.06684 18.043 6.94808 18.2226 7.02165 18.3612C7.09522 18.4999 7.30931 18.4999 7.73747 18.4999H9.26253C9.69069 18.4999 9.90478 18.4999 9.97835 18.6385C10.0519 18.7772 9.93316 18.9568 9.69566 19.3161L7.9216 21.9999"
            stroke-linejoin="round" />
          <path d="M16 19.9999L15 21.9999" stroke-linejoin="round" />
          <path d="M13 19.9999L12 21.9999" stroke-linejoin="round" />
          <path
            d="M2.95939 9.19373C2.21865 6.47179 3.85922 3.67397 6.6237 2.94463M2.95939 9.19373L2 9.44684M2.95939 9.19373C3.14359 9.87059 3.4577 10.479 3.86823 11M6.6237 2.94463L6.36663 2M6.6237 2.94463C8.66673 2.40563 10.7518 3.14719 12 4.66961M3.4765 5.32297L2.4644 4.74628M11.1407 2.45725L10.557 3.45494" />
          <path
            d="M17.4776 10.9008C17.485 10.9007 17.4925 10.9007 17.5 10.9007C19.9853 10.9007 22 12.8821 22 15.3263C22 17.2532 20.7478 18.8925 19 19.5M17.4776 10.9008C17.4924 10.7388 17.5 10.5748 17.5 10.409C17.5 7.42169 15.0376 5 12 5C9.12324 5 6.76233 7.17208 6.52042 9.9396M17.4776 10.9008C17.3753 12.0165 16.9286 13.0344 16.2428 13.8511M6.52042 9.9396C3.98398 10.177 2 12.2779 2 14.8345C2 16.4433 2.78555 17.8716 4 18.7687M6.52042 9.9396C6.67826 9.92483 6.83823 9.91727 7 9.91727C8.12582 9.91727 9.16474 10.2832 10.0005 10.9007"
            stroke-linejoin="round" />
        </svg> MausamX
      </div>

      <!-- Nav links -->
      <nav class="mx-nav">
        <a href="index.html" class="mx-nav-link active">Current</a>
        <a href="world.html" class="mx-nav-link">World Map</a>
        <a href="earthquake.html" class="mx-nav-link">Earthquakes</a>
      </nav>

      <!-- Right controls -->
      <div class="mx-header-right">
        <form id="search-form" class="mx-search-bar" aria-label="Search city">
          <button type="submit" style="background:none; border:none; padding:0; display:flex; cursor:pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" color="#ffffff" fill="none"
              stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 17L21 21" />
              <path
                d="M19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19C15.4183 19 19 15.4183 19 11Z" />
            </svg>
          </button>
          <input type="text" id="search-input" placeholder="Search city..." style="background:none; border:none; outline:none; color:var(--text); font-family:inherit; font-size:inherit; width: 100%;" />
        </form>
        <!-- <div class="mx-avatar">
          <i class="fa-solid fa-user"></i>
        </div> -->
      </div>

    </div>
  </header>

  <!-- ══ Main Content ════════════════════════════════════════════ -->
  <main class="mx-main">

    <!-- Top Row: Main weather card + Today's Outlook -->
    <div class="mx-top-row">

      <!-- ── Main Weather Card ── -->
      <div class="mx-weather-card">
        <div class="mx-card-top">
          <div class="mx-station-col">
            <!-- JS hook: #city-name -->
            <p class="mx-station-label">
              <i class="fa-solid fa-location-dot"></i> ACTIVE STATION
            </p>
            <h1 id="city-name">Mumbai</h1>
          </div>
          <div class="mx-icon-col">
            <!-- JS hook: .weather-icon -->
            <img class="weather-icon" src="img/sun.png" alt="weather" />
            <!-- JS hook: #weather-main [0] -->
            <p id="weather-main" class="mx-condition">Clear Sky</p>
          </div>
        </div>

        <div class="mx-card-bottom">
          <!-- JS hook: #metric -->
          <div class="mx-temp-wrap">
            <span id="metric" class="mx-temp">0°</span><sup class="mx-temp-c">C</sup>
          </div>
          <div class="mx-stats-row">
            <div class="mx-stat">
              <span class="mx-stat-label">HUMIDITY</span>
              <span class="mx-stat-val">
                <i class="fa-solid fa-droplet"></i>
                <!-- JS hook: #humidity -->
                <span id="humidity">60</span>%
              </span>
            </div>
            <div class="mx-stat-sep"></div>
            <div class="mx-stat">
              <span class="mx-stat-label">FEELS LIKE</span>
              <span class="mx-stat-val">
                <i class="fa-solid fa-temperature-half"></i>
                <!-- JS hook: #feels-like -->
                <span id="feels-like">60</span>°
              </span>
            </div>
          </div>
        </div>
      </div>

      <!-- ── Today's Outlook Card ── -->
      <div class="mx-outlook-card">
        <p class="mx-outlook-label">TODAY'S OUTLOOK</p>
        <div class="mx-outlook-icon-wrap">
          <!-- JS hook: .weather-icons -->
          <img class="weather-icons" src="img/sun.png" alt="today" />
        </div>
        <!-- JS hook: #weather-main [1] + .weather-main-today -->
        <p id="weather-main" class="mx-outlook-cond weather-main-today">Sunny</p>
        <div class="mx-outlook-pills">
          <div class="mx-pill">
            <span class="mx-pill-lbl">High</span>
            <!-- JS hook: #temp-max-today -->
            <span id="temp-max-today" class="mx-pill-val">55°</span>
          </div>
          <div class="mx-pill mx-pill-low">
            <span class="mx-pill-lbl">Low</span>
            <!-- JS hook: #temp-min-today -->
            <span id="temp-min-today" class="mx-pill-val">50°</span>
          </div>
        </div>
      </div>

    </div><!-- /mx-top-row -->

    <!-- ── Atmospheric Projection (6-day forecast) ── -->
    <section class="mx-forecast-section">
      <div class="mx-forecast-head">
        <div>
          <h2 class="mx-section-title">Atmospheric Projection</h2>
          <p class="mx-section-sub">Upcoming 6-day meteorological transition</p>
        </div>
      </div>
      <!-- JS renders .weather-forecast-box cards inside here -->
      <div id="future-forecast-box" class="mx-forecast-grid"></div>
    </section>

    <!-- ── Bottom Metric Cards ── -->
    <div class="mx-metric-row">
      <div class="mx-metric-card">
        <div class="mx-metric-badge mx-aq" id="aqi-badge">AQ</div>
        <div class="mx-metric-text">
          <div class="mx-metric-title">Air Quality</div>
          <div class="mx-metric-sub" id="aqi-sub">Loading…</div>
        </div>
        <div class="mx-metric-bar">
          <div class="mx-bar-fill" id="aqi-bar" style="width:0%"></div>
        </div>
      </div>
      <div class="mx-metric-card">
        <div class="mx-metric-badge mx-uv">
          <i class="fa-regular fa-sun"></i>
        </div>
        <div class="mx-metric-text">
          <div class="mx-metric-title">UV Index</div>
          <div class="mx-metric-sub" id="uv-sub">Loading…</div>
        </div>
        <div class="mx-metric-bar">
          <div class="mx-bar-fill mx-bar-uv" id="uv-bar" style="width:0%"></div>
        </div>
      </div>
    </div>

  </main><!-- /mx-main -->

  <script src="js/main.js"></script>
</body>

</html>
